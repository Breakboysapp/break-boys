<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Break Boys">
  <!-- Mark: rounded black square with stylized "BB" + red bottom stripe -->
  <g>
    <rect x="0" y="0" width="64" height="64" rx="10" fill="#0a0a0a"/>
    <!-- Red accent stripe along the bottom -->
    <rect x="0" y="50" width="64" height="6" fill="#d40028"/>
    <!-- Two interlocking "B"s as a tight monogram -->
    <text x="32" y="42"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif"
          font-size="34" font-weight="900" letter-spacing="-2"
          text-anchor="middle" fill="#ffffff">BB</text>
  </g>
  <!-- Wordmark -->
  <g>
    <text x="80" y="29"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif"
          font-size="11" font-weight="700" letter-spacing="2"
          fill="#d40028">BREAK</text>
    <text x="80" y="50"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif"
          font-size="24" font-weight="900" letter-spacing="-1"
          fill="#0a0a0a">BOYS</text>
  </g>
</svg>
